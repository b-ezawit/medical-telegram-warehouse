version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: medical_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_secret_password
      POSTGRES_DB: medical_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: